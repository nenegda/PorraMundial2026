<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Mundial 2026 - Calendario Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #app-interface { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-gray-950 z-50 px-4">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6">
                PORRA MUNDIAL 🏆
            </h1>
            <input type="text" id="username" placeholder="Tu nombre" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 mb-4 text-white focus:outline-none">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg transition">
                Entrar a jugar
            </button>
        </div>
    </div>

    <!-- INTERFAZ PRINCIPAL -->
    <div id="app-interface">
        <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center px-8">
            <h1 class="text-xl font-bold text-blue-400">MUNDIAL 2026 🇺🇸 🇲🇽 🇨🇦</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm">Usuario: <strong id="display-user" class="text-emerald-400"></strong></span>
                <button onclick="location.reload()" class="text-xs bg-red-900/40 text-red-300 px-2 py-1 rounded hover:bg-red-900/60 transition">Salir</button>
            </div>
        </header>

        <nav class="flex justify-center bg-gray-800 border-b border-gray-700 sticky top-0 z-40 overflow-x-auto">
            <button onclick="switchTab('fase-grupos')" id="btn-fase-grupos" class="tab-btn active px-6 py-4 text-sm whitespace-nowrap">Fase de Grupos (72 Partidos)</button>
            <button onclick="switchTab('cruces')" id="btn-cruces" class="tab-btn px-6 py-4 text-sm whitespace-nowrap">Dieciseisavos (16 Cruces)</button>
            <button onclick="switchTab('comunidad')" id="btn-comunidad" class="tab-btn px-6 py-4 text-sm whitespace-nowrap text-yellow-400 font-bold">CLASIFICACIÓN 📊</button>
            <button onclick="switchTab('sistema-puntos')" id="btn-sistema-puntos" class="tab-btn px-6 py-4 text-sm whitespace-nowrap text-blue-400 font-bold">REGLAS 📜</button>
        </nav>

        <main class="max-w-7xl mx-auto mt-8 px-4">
            
            <!-- GRUPOS TOTALES (A-L) -->
            <section id="fase-grupos" class="tab-content active grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Se autogeneran los 6 partidos por grupo aquí -->
            </section>

            <!-- ELIMINATORIAS COMPLETAS -->
            <section id="cruces" class="tab-content">
                <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Ronda de Dieciseisavos de Final</h2>
                <div id="grid-eliminatorias" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Se autogeneran los 16 partidos aquí -->
                </div>
            </section>

            <!-- RANKING -->
            <section id="comunidad" class="tab-content">
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-md max-w-4xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-2xl font-bold">Ranking General de la Porra</h2>
                        <span id="api-status" class="text-xs bg-yellow-900/50 text-yellow-400 px-3 py-1 rounded-full border border-yellow-600/30">
                            🔄 Sincronizando puntos con la API...
                        </span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-900 text-gray-400 text-xs uppercase">
                                <tr>
                                    <th class="px-6 py-3 w-16">Pos</th>
                                    <th class="px-6 py-3">Usuario</th>
                                    <th class="px-6 py-3 text-right">Puntos Totales</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-puntos" class="divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- NORMAS -->
            <section id="sistema-puntos" class="tab-content max-w-4xl mx-auto space-y-6">
                <div class="bg-gradient-to-br from-blue-900/40 to-gray-800 border border-blue-700/50 rounded-2xl p-6 shadow-xl">
                    <h2 class="text-3xl font-extrabold text-blue-400 mb-2">Sistema de Clasificación Dinámica</h2>
                    <p class="text-gray-300 text-sm">Los puntos se calculan comparando tus apuestas con el archivo JSON remoto.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const URL_RESULTADOS_API = "https://api.jsonbin.io/v3/b/6601b0fbe41b4d34e4de5604?meta=false"; 
        let RESULTADOS_REALES = { partidos: {} };

        // 12 Grupos Oficiales del Mundial 2026
        const equiposPorGrupo = {
            A: ["México", "Sudáfrica", "Corea del Sur", "República Checa"],
            B: ["Canadá", "Bosnia y Herzegovina", "Catar", "Suiza"],
            C: ["Brasil", "Marruecos", "Haití", "Escocia"],
            D: ["Estados Unidos", "Paraguay", "Australia", "Turquía"],
            E: ["Alemania", "Curazao", "Costa de Marfil", "Ecuador"],
            F: ["Países Bajos", "Japón", "Suecia", "Túnez"],
            G: ["Bélgica", "Egipto", "Irán", "Nueva Zelanda"],
            H: ["España", "Cabo Verde", "Arabia Saudita", "Uruguay"],
            I: ["Francia", "Senegal", "Irak", "Noruega"],
            J: ["Argentina", "Argelia", "Austria", "Jordania"],
            K: ["Portugal", "RD Congo", "Uzbekistán", "Colombia"],
            L: ["Inglaterra", "Croacia", "Ghana", "Panamá"]
        };

        // Los 16 cruces correspondientes a la Ronda de 32 (Dieciseisavos)
        const crucesEliminatorias = [
            { id: "R32_1", e1: "1º Grupo A", e2: "3º Grupo C/D/E" },
            { id: "R32_2", e1: "1º Grupo B", e2: "2º Grupo F" },
            { id: "R32_3", e1: "1º Grupo C", e2: "2º Grupo E" },
            { id: "R32_4", e1: "1º Grupo D", e2: "3º Grupo F/G/H" },
            { id: "R32_5", e1: "1º Grupo E", e2: "2º Grupo A" },
            { id: "R32_6", e1: "1º Grupo F", e2: "2º Grupo B" },
            { id: "R32_7", e1: "1º Grupo G", e2: "3º Grupo I/J/K" },
            { id: "R32_8", e1: "1º Grupo H", e2: "2º Grupo J" },
            { id: "R32_9", e1: "1º Grupo I", e2: "3º Grupo A/B/C" },
            { id: "R32_10", e1: "1º Grupo J", e2: "2º Grupo L" },
            { id: "R32_11", e1: "1º Grupo K", e2: "2º Grupo H" },
            { id: "R32_12", e1: "1º Grupo L", e2: "3º Edición Extra" },
            { id: "R32_13", e1: "2º Grupo C", e2: "2º Grupo G" },
            { id: "R32_14", e1: "2º Grupo D", e2: "2º Grupo K" },
            { id: "R32_15", e1: "2º Grupo I", e2: "2º Grupo E" },
            { id: "R32_16", e1: "2º Grupo J", e2: "2º Grupo A" }
        ];

        let currentUser = "";
        let baseDatosLocal = JSON.parse(localStorage.getItem('porra_mundial_v3')) || {};

        async function cargarResultadosDesdeAPI() {
            const statusLabel = document.getElementById('api-status');
            try {
                const respuesta = await fetch(URL_RESULTADOS_API);
                if(!respuesta.ok) throw new Error();
                RESULTADOS_REALES = await respuesta.json();
                statusLabel.innerText = "✅ Conectado a la API de Resultados";
                statusLabel.className = "text-xs bg-emerald-900/50 text-emerald-400 px-3 py-1 rounded-full border border-emerald-600/30";
            } catch (error) {
                statusLabel.innerText = "⚠️ Modo Local activado (Sin conexión externa)";
                statusLabel.className = "text-xs bg-amber-900/50 text-amber-400 px-3 py-1 rounded-full border border-amber-600/30";
            }
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            if (!user) return;
            currentUser = user;
            
            if (!baseDatosLocal[currentUser]) {
                baseDatosLocal[currentUser] = { goles: {} };
            }

            document.getElementById('display-user').innerText = currentUser;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            
            cargarResultadosDesdeAPI();
            inicializarGrupos();
            inicializarEliminatorias();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'comunidad') calcularYMostrarPuntos();
        }

        // AUTO-GENERACIÓN MATEMÁTICA DE LOS 6 PARTIDOS POR GRUPO
        function inicializarGrupos() {
            const container = document.getElementById('fase-grupos');
            container.innerHTML = "";
            
            Object.keys(equiposPorGrupo).forEach(letra => {
                const eq = equiposPorGrupo[letra];
                
                // Definición matemática de enfrentamientos todos contra todos (6 combinaciones posibles)
                const ordenPartidos = [
                    { p: "p1", l: eq[0], v: eq[1] },
                    { p: "p2", l: eq[2], v: eq[3] },
                    { p: "p3", l: eq[0], v: eq[2] },
                    { p: "p4", l: eq[1], v: eq[3] },
                    { p: "p5", l: eq[3], v: eq[0] },
                    { p: "p6", l: eq[1], v: eq[2] }
                ];

                let htmlPartidos = "";
                ordenPartidos.forEach(match => {
                    const idPartido = `${letra}_${match.p}`;
                    htmlPartidos += `
                        <div class="flex items-center justify-between gap-1 text-xs bg-gray-900/50 p-2 rounded border border-gray-700/40">
                            <span class="w-24 truncate text-gray-300">${match.l}</span>
                            <div class="flex items-center gap-1">
                                <input type="number" oninput="guardar('${idPartido}-1', this.value)" value="${baseDatosLocal[currentUser].goles[idPartido+'-1'] || ''}" class="w-9 bg-gray-950 border border-gray-700 text-center rounded text-white p-1 focus:border-blue-500 outline-none">
                                <span class="text-gray-600 font-bold">-</span>
                                <input type="number" oninput="guardar('${idPartido}-2', this.value)" value="${baseDatosLocal[currentUser].goles[idPartido+'-2'] || ''}" class="w-9 bg-gray-950 border border-gray-700 text-center rounded text-white p-1 focus:border-blue-500 outline-none">
                            </div>
                            <span class="w-24 text-right truncate text-gray-300">${match.v}</span>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-xl shadow-md">
                        <h3 class="font-bold text-blue-400 mb-3 border-b border-gray-700 pb-1 text-sm tracking-wider">
                            GRUPO ${letra}
                        </h3>
                        <div class="space-y-2">
                            ${htmlPartidos}
                        </div>
                    </div>
                `;
            });
        }

        // GENERACIÓN DE LOS 16 PARTIDOS DE ELIMINATORIAS DE FORMA COMPLETA
        function inicializarEliminatorias() {
            const container = document.getElementById('grid-eliminatorias');
            container.innerHTML = "";

            crucesEliminatorias.forEach(c => {
                container.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-3 rounded-xl flex flex-col justify-between shadow-sm">
                        <span class="text-[10px] text-blue-400 font-bold uppercase mb-1.5">${c.id.replace('R32_', 'PARTIDO ')}</span>
                        <div class="space-y-1.5">
                            <div class="flex justify-between items-center bg-gray-900/60 p-1.5 rounded border border-gray-700/40">
                                <span class="text-xs text-gray-400 truncate">${c.e1}</span>
                                <input type="number" oninput="guardar('${c.id}-1', this.value)" value="${baseDatosLocal[currentUser].goles[c.id+'-1'] || ''}" class="w-9 bg-gray-950 border border-gray-700 text-center rounded text-white text-xs p-1 outline-none">
                            </div>
                            <div class="flex justify-between items-center bg-gray-900/60 p-1.5 rounded border border-gray-700/40">
                                <span class="text-xs text-gray-400 truncate">${c.e2}</span>
                                <input type="number" oninput="guardar('${c.id}-2', this.value)" value="${baseDatosLocal[currentUser].goles[c.id+'-2'] || ''}" class="w-9 bg-gray-950 border border-gray-700 text-center rounded text-white text-xs p-1 outline-none">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function guardar(id, val) {
            baseDatosLocal[currentUser].goles[id] = val;
            localStorage.setItem('porra_mundial_v3', JSON.stringify(baseDatosLocal));
        }

        function calcularYMostrarPuntos() {
            const tbody = document.getElementById('tabla-puntos');
            tbody.innerHTML = "";

            let ranking = Object.keys(baseDatosLocal).map(user => {
                let pts = 0;
                const datos = baseDatosLocal[user];

                if(RESULTADOS_REALES.partidos) {
                    Object.keys(RESULTADOS_REALES.partidos).forEach(id => {
                        const real = RESULTADOS_REALES.partidos[id]; 
                        const p1 = datos.goles[id+"-1"];
                        const p2 = datos.goles[id+"-2"];
                        
                        if(p1 !== undefined && p2 !== undefined && p1 !== "" && p2 !== "") {
                            const pronostico = `${p1}-${p2}`;
                            if (real === pronostico) {
                                pts += 10; 
                            } else {
                                const [r1, r2] = real.split("-").map(Number);
                                const signReal = r1 > r2 ? 1 : (r1 < r2 ? 2 : 0);
                                const signPron = Number(p1) > Number(p2) ? 1 : (Number(p1) < Number(p2) ? 2 : 0);
                                if (signReal === signPron) pts += 3; 
                            }
                        }
                    });
                }
                return { name: user, total: pts };
            });

            ranking.sort((a,b) => b.total - a.total);

            ranking.forEach((r, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/30 transition">
                        <td class="px-6 py-4 font-bold text-gray-400 text-sm">${index + 1}</td>
                        <td class="px-6 py-4 font-semibold text-white capitalize text-sm">${r.name}</td>
                        <td class="px-6 py-4 text-emerald-400 font-bold text-right text-sm">${r.total} pts</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
