<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Mundial 2026 - Sistema de Puntos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #app-interface { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-gray-950 z-50 px-4">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6">
                PORRA MUNDIAL 🏆
            </h1>
            <input type="text" id="username" placeholder="Tu nombre" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 mb-4 text-white">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg transition">
                Entrar a jugar
            </button>
        </div>
    </div>

    <div id="app-interface">
        <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center px-8">
            <h1 class="text-xl font-bold text-blue-400">MUNDIAL 2026</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm">Usuario: <strong id="display-user" class="text-emerald-400"></strong></span>
                <button onclick="location.reload()" class="text-xs bg-red-900/40 text-red-300 px-2 py-1 rounded">Salir</button>
            </div>
        </header>

        <nav class="flex justify-center bg-gray-800 border-b border-gray-700 sticky top-0 z-40">
            <button onclick="switchTab('fase-grupos')" id="btn-fase-grupos" class="tab-btn active px-6 py-4 text-sm">Grupos</button>
            <button onclick="switchTab('cruces')" id="btn-cruces" class="tab-btn px-6 py-4 text-sm">Eliminatorias</button>
            <button onclick="switchTab('comunidad')" id="btn-comunidad" class="tab-btn px-6 py-4 text-sm font-bold text-yellow-400">CLASIFICACIÓN 📊</button>
        </nav>

        <main class="max-w-7xl mx-auto mt-8 px-4">
            
            <section id="fase-grupos" class="tab-content active grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </section>

            <section id="cruces" class="tab-content">
                <div id="grid-r32" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
                </section>

            <section id="comunidad" class="tab-content">
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-md">
                    <h2 class="text-2xl font-bold mb-4 text-center">Ranking de la Porra</h2>
                    <p class="text-center text-xs text-gray-400 mb-6">
                        Exacto: +10 pts | Ganador: +3 pts | Posición Grupo: +3 pts
                    </p>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-900 text-gray-400 text-xs">
                                <tr>
                                    <th class="px-6 py-3">Pos</th>
                                    <th class="px-6 py-3">Usuario</th>
                                    <th class="px-6 py-3">Puntos Totales</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-puntos" class="divide-y divide-gray-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE RESULTADOS REALES (EDITAR ESTO)
        // ==========================================
        const RESULTADOS_REALES = {
            partidos: {
                "A1": "2-1", // México vs Sudáfrica quedó 2-1
                "A2": "0-0", 
            },
            grupos: {
                "A": ["México", "Corea del Sur", "Sudáfrica", "Chequia"] // El orden real final
            }
        };

        const equiposPorGrupo = {
            A: ["México", "Sudáfrica", "Corea del Sur", "Chequia"],
            B: ["Canadá", "Bosnia", "Qatar", "Suiza"]
            // ... resto de grupos
        };

        let currentUser = "";
        let baseDatosLocal = JSON.parse(localStorage.getItem('porra_mundial_v1')) || {};

        function login() {
            const user = document.getElementById('username').value.trim();
            if (!user) return;
            currentUser = user;
            
            // Si el usuario no existe, se crea (Sin restricción de nombre)
            if (!baseDatosLocal[currentUser]) {
                baseDatosLocal[currentUser] = { goles: {}, grupos: {} };
            }

            document.getElementById('display-user').innerText = currentUser;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            inicializarGrupos();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'comunidad') calcularYMostrarPuntos();
        }

        function inicializarGrupos() {
            const container = document.getElementById('fase-grupos');
            container.innerHTML = "";
            Object.keys(equiposPorGrupo).forEach(l => {
                const eq = equiposPorGrupo[l];
                container.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-xl">
                        <h3 class="font-bold text-blue-400 mb-3">GRUPO ${l}</h3>
                        <div class="space-y-2">
                            <div class="flex items-center gap-2">
                                <span class="text-xs w-20">${eq[0]}</span>
                                <input type="number" oninput="guardar('${l}1-1', this.value)" value="${baseDatosLocal[currentUser].goles[l+'1-1'] || ''}" class="w-10 bg-gray-900 text-center rounded">
                                <span>-</span>
                                <input type="number" oninput="guardar('${l}1-2', this.value)" value="${baseDatosLocal[currentUser].goles[l+'1-2'] || ''}" class="w-10 bg-gray-900 text-center rounded">
                                <span class="text-xs w-20">${eq[1]}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function guardar(id, val) {
            baseDatosLocal[currentUser].goles[id] = val;
            localStorage.setItem('porra_mundial_v1', JSON.stringify(baseDatosLocal));
        }

        function calcularYMostrarPuntos() {
            const tbody = document.getElementById('tabla-puntos');
            tbody.innerHTML = "";

            let ranking = Object.keys(baseDatosLocal).map(user => {
                let pts = 0;
                const datos = baseDatosLocal[user];

                // 1. Puntos por Partidos (Exacto +10, Ganador +3)
                Object.keys(RESULTADOS_REALES.partidos).forEach(id => {
                    const real = RESULTADOS_REALES.partidos[id]; // "2-1"
                    const pronostico = (datos.goles[id+"-1"] || "0") + "-" + (datos.goles[id+"-2"] || "0");

                    if (real === pronostico) {
                        pts += 10;
                    } else {
                        const [r1, r2] = real.split("-").map(Number);
                        const [p1, p2] = pronostico.split("-").map(Number);
                        const signReal = r1 > r2 ? 1 : (r1 < r2 ? 2 : 0);
                        const signPron = p1 > p2 ? 1 : (p1 < p2 ? 2 : 0);
                        if (signReal === signPron) pts += 3;
                    }
                });

                // 2. Puntos por Posición de Grupo (+3 por acierto)
                // Aquí el código compararía el ranking calculado por el usuario vs RESULTADOS_REALES.grupos
                // Simplificado para este ejemplo.

                return { name: user, total: pts };
            });

            // Ordenar por puntos
            ranking.sort((a,b) => b.total - a.total);

            ranking.forEach((r, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4">${index + 1}</td>
                        <td class="px-6 py-4 font-bold capitalize">${r.name}</td>
                        <td class="px-6 py-4 text-emerald-400 font-bold">${r.total} pts</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
