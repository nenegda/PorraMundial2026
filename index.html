<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Mundial 2026 - Puntos Dinámicos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #app-interface { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-gray-950 z-50 px-4">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6">
                PORRA MUNDIAL 🏆
            </h1>
            <input type="text" id="username" placeholder="Tu nombre" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 mb-4 text-white focus:outline-none">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg transition">
                Entrar a jugar
            </button>
        </div>
    </div>

    <!-- INTERFAZ PRINCIPAL -->
    <div id="app-interface">
        <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center px-8">
            <h1 class="text-xl font-bold text-blue-400">MUNDIAL 2026</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm">Usuario: <strong id="display-user" class="text-emerald-400"></strong></span>
                <button onclick="location.reload()" class="text-xs bg-red-900/40 text-red-300 px-2 py-1 rounded hover:bg-red-900/60 transition">Salir</button>
            </div>
        </header>

        <nav class="flex justify-center bg-gray-800 border-b border-gray-700 sticky top-0 z-40 overflow-x-auto">
            <button onclick="switchTab('fase-grupos')" id="btn-fase-grupos" class="tab-btn active px-6 py-4 text-sm whitespace-nowrap">Grupos</button>
            <button onclick="switchTab('cruces')" id="btn-cruces" class="tab-btn px-6 py-4 text-sm whitespace-nowrap">Eliminatorias</button>
            <button onclick="switchTab('comunidad')" id="btn-comunidad" class="tab-btn px-6 py-4 text-sm whitespace-nowrap text-yellow-400 font-bold">CLASIFICACIÓN 📊</button>
            <button onclick="switchTab('sistema-puntos')" id="btn-sistema-puntos" class="tab-btn px-6 py-4 text-sm whitespace-nowrap text-blue-400 font-bold">REGLAS Y PUNTOS 📜</button>
        </nav>

        <main class="max-w-7xl mx-auto mt-8 px-4">
            
            <!-- GRUPOS -->
            <section id="fase-grupos" class="tab-content active grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dinámico -->
            </section>

            <!-- ELIMINATORIAS -->
            <section id="cruces" class="tab-content">
                <div id="grid-r32" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <p class="text-gray-400 text-sm">Eliminatorias configuradas.</p>
                </div>
            </section>

            <!-- CLASIFICACIÓN / RANKING -->
            <section id="comunidad" class="tab-content">
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-md max-w-4xl mx-auto">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-2xl font-bold">Ranking General de la Porra</h2>
                        <span id="api-status" class="text-xs bg-yellow-900/50 text-yellow-400 px-3 py-1 rounded-full border border-yellow-600/30">
                            🔄 Cargando resultados oficiales...
                        </span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-900 text-gray-400 text-xs uppercase">
                                <tr>
                                    <th class="px-6 py-3 w-16">Pos</th>
                                    <th class="px-6 py-3">Usuario</th>
                                    <th class="px-6 py-3 text-right">Puntos Totales</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-puntos" class="divide-y divide-gray-700">
                                <!-- Se calcula dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- REGLAS -->
            <section id="sistema-puntos" class="tab-content max-w-4xl mx-auto space-y-8">
                <div class="bg-gradient-to-br from-blue-900/40 to-gray-800 border border-blue-700/50 rounded-2xl p-6 shadow-xl">
                    <h2 class="text-3xl font-extrabold text-blue-400 mb-2">Normativa del Sistema de Puntos</h2>
                    <p class="text-gray-300 text-sm">Exacto: +10 puntos | Ganador: +3 puntos | Posición de Grupo: +3 puntos.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // =========================================================================
        // ENLACE A TU API / FUENTE DE DATOS EXTERNA
        // =========================================================================
        // Reemplaza esta URL por tu JSON real de GitHub Gist o JSONBin cuando lo tengas
        const URL_RESULTADOS_API = "https://api.jsonbin.io/v3/b/6601b0fbe41b4d34e4de5604?meta=false"; 

        // Variable global donde guardaremos lo que responda la API
        let RESULTADOS_REALES = { partidos: {}, grupos: {} };

        const equiposPorGrupo = {
            A: ["México", "Sudáfrica", "Corea del Sur", "Chequia"],
            B: ["Canadá", "Bosnia", "Qatar", "Suiza"]
        };

        let currentUser = "";
        let baseDatosLocal = JSON.parse(localStorage.getItem('porra_mundial_v1')) || {};

        // Función para descargar los datos de la API externa de manera asíncrona
        async function cargarResultadosDesdeAPI() {
            const statusLabel = document.getElementById('api-status');
            try {
                const respuesta = await fetch(URL_RESULTADOS_API);
                if(!respuesta.ok) throw new Error("Error de conexión");
                
                // Guardamos los datos de internet en nuestra variable de control
                RESULTADOS_REALES = await respuesta.json();
                
                statusLabel.innerText = "✅ Resultados actualizados vía API";
                statusLabel.className = "text-xs bg-emerald-900/50 text-emerald-400 px-3 py-1 rounded-full border border-emerald-600/30";
            } catch (error) {
                console.error("No se pudo conectar a la API de resultados:", error);
                statusLabel.innerText = "⚠️ Modo Offline: Usando últimos resultados conocidos";
                statusLabel.className = "text-xs bg-red-900/50 text-red-400 px-3 py-1 rounded-full border border-red-600/30";
            }
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            if (!user) return;
            currentUser = user;
            
            if (!baseDatosLocal[currentUser]) {
                baseDatosLocal[currentUser] = { goles: {}, grupos: {} };
            }

            document.getElementById('display-user').innerText = currentUser;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            
            // Al entrar, disparamos la llamada a la API en segundo plano
            cargarResultadosDesdeAPI();
            inicializarGrupos();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'comunidad') {
                // Cada vez que miren la clasificación, recalculamos con los datos frescos de la API
                calcularYMostrarPuntos();
            }
        }

        function inicializarGrupos() {
            const container = document.getElementById('fase-grupos');
            container.innerHTML = "";
            Object.keys(equiposPorGrupo).forEach(l => {
                const eq = equiposPorGrupo[l];
                container.innerHTML += `
                    <div class="bg-gray-800 border border-gray-700 p-4 rounded-xl">
                        <h3 class="font-bold text-blue-400 mb-3">GRUPO ${l}</h3>
                        <div class="space-y-2">
                            <div class="flex items-center justify-between gap-2">
                                <span class="text-xs w-20 truncate">${eq[0]}</span>
                                <div class="flex items-center gap-1">
                                    <input type="number" oninput="guardar('${l}1-1', this.value)" value="${baseDatosLocal[currentUser].goles[l+'1-1'] || ''}" class="w-10 bg-gray-900 text-center rounded p-1 text-white">
                                    <span>-</span>
                                    <input type="number" oninput="guardar('${l}1-2', this.value)" value="${baseDatosLocal[currentUser].goles[l+'1-2'] || ''}" class="w-10 bg-gray-900 text-center rounded p-1 text-white">
                                </div>
                                <span class="text-xs w-20 text-right truncate">${eq[1]}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function guardar(id, val) {
            baseDatosLocal[currentUser].goles[id] = val;
            localStorage.setItem('porra_mundial_v1', JSON.stringify(baseDatosLocal));
        }

        function calcularYMostrarPuntos() {
            const tbody = document.getElementById('tabla-puntos');
            tbody.innerHTML = "";

            let ranking = Object.keys(baseDatosLocal).map(user => {
                let pts = 0;
                const datos = baseDatosLocal[user];

                // Comparamos los goles del usuario contra el objeto RESULTADOS_REALES traído de la API
                if(RESULTADOS_REALES.partidos) {
                    Object.keys(RESULTADOS_REALES.partidos).forEach(id => {
                        const real = RESULTADOS_REALES.partidos[id]; // Ejemplo: "2-1"
                        const p1 = datos.goles[id+"-1"];
                        const p2 = datos.goles[id+"-2"];
                        
                        if(p1 !== undefined && p2 !== undefined && p1 !== "" && p2 !== "") {
                            const pronostico = `${p1}-${p2}`;
                            if (real === pronostico) {
                                pts += 10; // Exacto
                            } else {
                                const [r1, r2] = real.split("-").map(Number);
                                const signReal = r1 > r2 ? 1 : (r1 < r2 ? 2 : 0);
                                const signPron = Number(p1) > Number(p2) ? 1 : (Number(p1) < Number(p2) ? 2 : 0);
                                if (signReal === signPron) pts += 3; // Ganador/Empate
                            }
                        }
                    });
                }
                return { name: user, total: pts };
            });

            ranking.sort((a,b) => b.total - a.total);

            ranking.forEach((r, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/30 transition">
                        <td class="px-6 py-4 font-bold text-gray-400">${index + 1}</td>
                        <td class="px-6 py-4 font-semibold text-white capitalize">${r.name}</td>
                        <td class="px-6 py-4 text-emerald-400 font-bold text-right">${r.total} pts</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
